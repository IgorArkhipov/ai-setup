- description: "Discovers the governed logging guide from ops chat context"
  metadata:
    case_id: EC-001
    tested: "The answer routes a logs question to the governed logging guide and explains the missing `./tmp/logs` state correctly."
    expected: "The answer names `memory-bank/ops/logging.md`, mentions `./tmp/logs`, states that the directory may not exist yet, distinguishes repo-local logs from the audit log, and does not rely on `.env*` files."
    reproduce: "Run `promptfoo eval -c evals/promptfooconfig.yaml --filter-pattern EC-001` with either the live NVIDIA provider or `--providers echo` for structural validation."
    verification: "Pass when all five `icontains` assertions below succeed for the same answer."
  vars:
    question: "Where should I look for AgentScope logs if I do not see a tmp/logs directory in this checkout, and should I rely on any .env-based log config?"
    ops_index: file://../memory-bank/ops/README.md
    primary_doc_path: memory-bank/ops/logging.md
    primary_doc_content: file://../memory-bank/ops/logging.md
    supporting_context: file://../memory-bank/ops/config.md
  assert:
    - type: icontains
      value: "memory-bank/ops/logging.md"
    - type: icontains
      value: "./tmp/logs"
    - type: icontains
      value: "expected state"
    - type: icontains
      value: "~/.config/agentscope/audit/log.jsonl"
    - type: icontains
      value: ".env"

- description: "Distinguishes repo-local runtime logs from AgentScope audit state"
  metadata:
    case_id: EC-002
    tested: "The answer distinguishes external command-run logs from internal AgentScope-owned audit state."
    expected: "The answer maps external logs to `./tmp/logs`, internal logs to `appStateRoot` audit state, and explains that the two evidence streams are complementary."
    reproduce: "Run `promptfoo eval -c evals/promptfooconfig.yaml --filter-pattern EC-002`."
    verification: "Pass when all five assertions below are present in one answer."
  vars:
    question: "In AgentScope, what are the external command-run logs versus the internal app-owned audit logs?"
    ops_index: file://../memory-bank/ops/README.md
    primary_doc_path: memory-bank/ops/logging.md
    primary_doc_content: file://../memory-bank/ops/logging.md
    supporting_context: file://../memory-bank/ops/config.md
  assert:
    - type: icontains
      value: "memory-bank/ops/logging.md"
    - type: icontains
      value: "./tmp/logs"
    - type: icontains
      value: "appStateRoot"
    - type: icontains
      value: "audit/log.jsonl"
    - type: icontains
      value: "complementary"

- description: "EC-003 configuration precedence remains explicit"
  metadata:
    case_id: EC-003
    tested: "The answer reports the documented configuration precedence in the correct order."
    expected: "The answer names `memory-bank/ops/config.md` and lists built-in defaults, global config, project config, and explicit CLI flags in the documented order."
    reproduce: "Run `promptfoo eval -c evals/promptfooconfig.yaml --filter-pattern EC-003`."
    verification: "Pass when the answer contains the path and the four precedence checkpoints below."
  vars:
    question: "What configuration source wins in AgentScope if defaults, ~/.config/agentscope/config.json, a project .agentscope.json, and CLI flags all disagree?"
    ops_index: file://../memory-bank/ops/README.md
    primary_doc_path: memory-bank/ops/config.md
    primary_doc_content: file://../memory-bank/ops/config.md
    supporting_context: "No additional supporting context."
