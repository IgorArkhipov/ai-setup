services:
  web:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ai_setup_development
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_TEST_NAME: ai_setup_test
      DB_USERNAME: postgres
      RAILS_ENV: development
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ai_setup_development
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_setup_development"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres18_data:/var/lib/postgresql

volumes:
  postgres18_data:
